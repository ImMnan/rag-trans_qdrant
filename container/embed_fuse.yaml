apiVersion: v1
kind: ServiceAccount
metadata:
  name: rag-gateway-ksa
  namespace: hawk
  annotations:
    iam.gke.io/gcp-service-account: support-sales@appspot.gserviceaccount.com
    # Workload Identity binding applied:
    # gcloud iam service-accounts add-iam-policy-binding support-sales@appspot.gserviceaccount.com \
    #   --role=roles/iam.workloadIdentityUser \
    #   --member="serviceAccount:support-sales.svc.id.goog[hawk/rag-gateway-ksa]"

---
apiVersion: v1
kind: Service
metadata:
  name: embed-e5-service
  namespace: hawk
spec:
  ports:
  - name: embed-http
    port: 80
    protocol: TCP
    targetPort: 8000
  # The label selector should match the deployment labels & it is useful for prefix caching feature
  selector:
    app: embed-e5large
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embed-e5large-fuse
  namespace: hawk
  labels:
    app: embed-e5large
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embed-e5large
  template:
    metadata:
      labels:
        app: embed-e5large
      annotations:
        # Injects the GCS Fuse sidecar (requires GKE Workload Identity + the
        # Cloud Storage FUSE CSI driver add-on enabled on the cluster).
        gke-gcsfuse/volumes: "true"
    spec:
      serviceAccountName: rag-gateway-ksa
      automountServiceAccountToken: true      
      volumes:
      - name: tmp
        emptyDir: {}
      - name: gcs-fuse
        csi:
          driver: gcsfuse.csi.storage.gke.io
          readOnly: true
          volumeAttributes:
            bucketName: "rag-model-weights-hawk"
            mountOptions: "implicit-dirs,uid=1000,gid=1000"
      containers:
      - name: e5large-ctr
        image: immnan/embed-e5large-py:0.2.3
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: embed-http
        env:
        - name: EMBED_MODEL
          value: "intfloat/multilingual-e5-large"
        - name: HF_HOME
          value: "/tmp/hf"
        - name: HF_HUB_CACHE
          value: "/mnt/gcs/.cache/huggingface/hf-cache/hub"
        - name: TRANSFORMERS_CACHE
          value: /tmp/hf/transformers
        - name: HF_HUB_OFFLINE
          value: "1"
        - name: TRANSFORMERS_OFFLINE
          value: "1"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
          readOnly: false
        - name: gcs-fuse
          mountPath: /mnt/gcs
          readOnly: true
        resources:
          requests:
            cpu: "1"
            memory: 4Gi
          limits:
            cpu: "2"
            memory: 8Gi
      # Bind the pod to the KSA that is linked to a GSA with storage.objectViewer
      # (or storage.objectAdmin if you need writes) on the bucket.
      
