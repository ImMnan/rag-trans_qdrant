apiVersion: v1
kind: Service
metadata:
  name: rag-gateway-service
  namespace: hawk
spec:
  ports:
  - name: rag-http
    port: 80
    protocol: TCP
    targetPort: 8000
  # The label selector should match the deployment labels & it is useful for prefix caching feature
  selector:
    app: rag-gateway
  sessionAffinity: None
  type: ClusterIP