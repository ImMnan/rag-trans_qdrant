apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-gateway
  namespace: hawk
  labels:
    app: rag-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-gateway
  template:
    metadata:
      labels:
        app: rag-gateway
      annotations:
        # Injects the GCS Fuse sidecar (requires GKE Workload Identity + the
        # Cloud Storage FUSE CSI driver add-on enabled on the cluster).
        gke-gcsfuse/volumes: "true"
    spec:
    
      # Allow the GCS Fuse CSI driver to run its init container
      initContainers: []
      volumes:
      - name: tmp
        emptyDir: {}
      # GCS Fuse CSI volume — replace BUCKET_NAME with your bucket
      - name: gcs-fuse
        csi:
          driver: gcsfuse.csi.storage.gke.io
          readOnly: false
          volumeAttributes:
            bucketName: "rag-model-weights-hawk"
            mountOptions: "implicit-dirs,uid=1000,gid=1000"
      containers:
      - name: gateway
        image: immnan/rag-gateway:0.1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: rag-http
        env:
        - name: QDRANT_INTERNAL_URL
          value: "qdrant-service.hawk.svc.cluster.local"
        - name: VLLM_INTERNAL_URL
          value: "qwen-3-service.hawk.svc.cluster.local"
        - name: QWEN_MODEL_NAME
          value: "Qwen/Qwen2.5-7B-Instruct"
        # Paths inside the container that map to the GCS bucket
        - name: HF_HOME
          value: "/mnt/gcs/.cache/huggingface"
        - name: MODEL_DIR
          value: "/mnt/gcs/models"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: gcs-fuse
          mountPath: /mnt/gcs
        resources:
          requests:
            cpu: "1"
            memory: 4Gi
            ephemeral-storage: "5Gi"
          limits:
            cpu: "2"
            memory: 8Gi
            ephemeral-storage: "10Gi"
      # Bind the pod to the KSA that is linked to a GSA with storage.objectViewer
      # (or storage.objectAdmin if you need writes) on the bucket.
      serviceAccountName: rag-gateway-ksa
