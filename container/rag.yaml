apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-gateway
  namespace: hawk
  labels:
    app: rag-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-gateway
  template:
    metadata:
      labels:
        app: rag-gateway
    spec:
      volumes:
      - name: tmp
        emptyDir: {}
      - name: model-cache
        persistentVolumeClaim:
          claimName: rag-model-cache
      initContainers:
      - name: download-models
        image: python:3.11-slim
        command:
          - sh
          - -c
          - |
            mkdir -p /models
            pip install -q huggingface_hub
            python -c "from huggingface_hub import snapshot_download; snapshot_download('intfloat/multilingual-e5-large', cache_dir='/models')"
      containers:
      - name: gateway
        image: immnan/rag-gateway:0.1.1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: rag-http
        env:
        - name: QDRANT_INTERNAL_URL
          value: "qdrant-service.hawk.svc.cluster.local"
        - name: VLLM_INTERNAL_URL
          value: "qwen-3-service.hawk.svc.cluster.local"
        - name: QWEN_MODEL_NAME
          value: "Qwen/Qwen2.5-7B-Instruct"
        # Paths inside the container that map to the GCS bucket
        - name: HF_HOME
          value: "/mnt/gcs/.cache/huggingface"
        - name: MODEL_DIR
          value: "/mnt/gcs/models"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: model-cache
          mountPath: /models          
        resources:
          requests:
            cpu: "1"
            memory: 4Gi
          limits:
            cpu: "2"
            memory: 8Gi  